apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: daddyjokes-depl
  labels:
    app.kubernetes.io/name: daddyjokes-depl
    app.kubernetes.io/part-of: daddyjokes-depl-project
    kubernetes.azure.com/generator: devhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: daddyjokes-depl
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80